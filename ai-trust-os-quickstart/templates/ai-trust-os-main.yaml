AWSTemplateFormatVersion: '2010-09-09'
Description: 'AI Trust OS - Main Infrastructure (VPC, IAM, Base Networking)'

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
    Description: Deployment environment
  
  VpcCidr:
    Type: String
    Default: 10.0.0.0/16
    AllowedPattern: ^(([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\/([0-9]|[1-2][0-9]|3[0-2])$
    Description: CIDR block for the VPC
  
  EnablePrivateLink:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Enable AWS PrivateLink for secure API access
  
  EnableVpcLattice:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: Enable VPC Lattice for service mesh
  
  LogRetentionDays:
    Type: Number
    Default: 90
    AllowedValues: [1, 3, 7, 14, 30, 60, 90, 120, 150, 180, 365]
    Description: CloudWatch log retention period
  
  AllowedCidrBlocks:
    Type: CommaDelimitedList
    Default: '0.0.0.0/0'
    Description: Allowed CIDR blocks for access (use specific ranges in production)

Conditions:
  IsProduction: !Equals [!Ref Environment, prod]
  EnablePrivateLinkCondition: !Equals [!Ref EnablePrivateLink, 'true']
  EnableVpcLatticeCondition: !Equals [!Ref EnableVpcLattice, 'true']
  CreateBastionHost: !And [!Equals [!Ref Environment, dev], !Not [!Equals [!Ref Environment, prod]]]

Mappings:
  RegionMap:
    us-east-1:
      AMI: ami-0123456789abcdef0
      BedrockAvailable: 'true'
      NeptuneAvailable: 'true'
    us-west-2:
      AMI: ami-0123456789abcdef1
      BedrockAvailable: 'true'
      NeptuneAvailable: 'true'
    eu-west-1:
      AMI: ami-0123456789abcdef2
      BedrockAvailable: 'true'
      NeptuneAvailable: 'true'
    ap-southeast-2:
      AMI: ami-0123456789abcdef3
      BedrockAvailable: 'true'
      NeptuneAvailable: 'true'
    ap-southeast-1:
      AMI: ami-0123456789abcdef4
      BedrockAvailable: 'true'
      NeptuneAvailable: 'true'

Resources:
  # VPC
  AITrustOSVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub 'ai-trust-os-vpc-${Environment}'
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: ai-trust-os

  # Internet Gateway
  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub 'ai-trust-os-igw-${Environment}'

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref AITrustOSVPC
      InternetGatewayId: !Ref InternetGateway

  # Public Subnets
  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref AITrustOSVPC
      CidrBlock: !Select [0, !Cidr [!Ref VpcCidr, 6, 8]]
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub 'ai-trust-os-public-subnet-1-${Environment}'
        - Key: Type
          Value: Public

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref AITrustOSVPC
      CidrBlock: !Select [1, !Cidr [!Ref VpcCidr, 6, 8]]
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub 'ai-trust-os-public-subnet-2-${Environment}'
        - Key: Type
          Value: Public

  # Private Subnets
  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref AITrustOSVPC
      CidrBlock: !Select [2, !Cidr [!Ref VpcCidr, 6, 8]]
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub 'ai-trust-os-private-subnet-1-${Environment}'
        - Key: Type
          Value: Private

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref AITrustOSVPC
      CidrBlock: !Select [3, !Cidr [!Ref VpcCidr, 6, 8]]
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub 'ai-trust-os-private-subnet-2-${Environment}'
        - Key: Type
          Value: Private

  # Database Subnets (Isolated)
  DatabaseSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref AITrustOSVPC
      CidrBlock: !Select [4, !Cidr [!Ref VpcCidr, 6, 8]]
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub 'ai-trust-os-db-subnet-1-${Environment}'
        - Key: Type
          Value: Database

  DatabaseSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref AITrustOSVPC
      CidrBlock: !Select [5, !Cidr [!Ref VpcCidr, 6, 8]]
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub 'ai-trust-os-db-subnet-2-${Environment}'
        - Key: Type
          Value: Database

  # NAT Gateway
  NatGateway1EIP:
    Type: AWS::EC2::EIP
    DependsOn: AttachGateway
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub 'ai-trust-os-nat-eip-1-${Environment}'

  NatGateway2EIP:
    Type: AWS::EC2::EIP
    DependsOn: AttachGateway
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub 'ai-trust-os-nat-eip-2-${Environment}'

  NatGateway1:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatGateway1EIP.AllocationId
      SubnetId: !Ref PublicSubnet1
      Tags:
        - Key: Name
          Value: !Sub 'ai-trust-os-nat-1-${Environment}'

  NatGateway2:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatGateway2EIP.AllocationId
      SubnetId: !Ref PublicSubnet2
      Tags:
        - Key: Name
          Value: !Sub 'ai-trust-os-nat-2-${Environment}'

  # Route Tables
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref AITrustOSVPC
      Tags:
        - Key: Name
          Value: !Sub 'ai-trust-os-public-rt-${Environment}'

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  PrivateRouteTable1:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref AITrustOSVPC
      Tags:
        - Key: Name
          Value: !Sub 'ai-trust-os-private-rt-1-${Environment}'

  PrivateRoute1:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable1
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway1

  PrivateSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet1
      RouteTableId: !Ref PrivateRouteTable1

  PrivateRouteTable2:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref AITrustOSVPC
      Tags:
        - Key: Name
          Value: !Sub 'ai-trust-os-private-rt-2-${Environment}'

  PrivateRoute2:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable2
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway2

  PrivateSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet2
      RouteTableId: !Ref PrivateRouteTable2

  # VPC Endpoints (PrivateLink)
  VPCEndpointS3:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.s3'
      VpcId: !Ref AITrustOSVPC
      RouteTableIds:
        - !Ref PrivateRouteTable1
        - !Ref PrivateRouteTable2

  VPCEndpointBedrock:
    Type: AWS::EC2::VPCEndpoint
    Condition: EnablePrivateLinkCondition
    Properties:
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.bedrock'
      VpcId: !Ref AITrustOSVPC
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      SecurityGroupIds:
        - !Ref VPCEndpointSecurityGroup
      VpcEndpointType: Interface
      PrivateDnsEnabled: true

  VPCEndpointBedrockRuntime:
    Type: AWS::EC2::VPCEndpoint
    Condition: EnablePrivateLinkCondition
    Properties:
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.bedrock-runtime'
      VpcId: !Ref AITrustOSVPC
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      SecurityGroupIds:
        - !Ref VPCEndpointSecurityGroup
      VpcEndpointType: Interface
      PrivateDnsEnabled: true

  # Security Groups
  VPCEndpointSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for VPC endpoints
      VpcId: !Ref AITrustOSVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          SourceSecurityGroupId: !Ref LambdaSecurityGroup
      Tags:
        - Key: Name
          Value: !Sub 'ai-trust-os-vpc-endpoint-sg-${Environment}'

  LambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Lambda functions
      VpcId: !Ref AITrustOSVPC
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          DestinationSecurityGroupId: !Ref VPCEndpointSecurityGroup
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: Allow HTTPS outbound for API calls
      Tags:
        - Key: Name
          Value: !Sub 'ai-trust-os-lambda-sg-${Environment}'

  OpenSearchSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for OpenSearch domain
      VpcId: !Ref AITrustOSVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          SourceSecurityGroupId: !Ref LambdaSecurityGroup
      Tags:
        - Key: Name
          Value: !Sub 'ai-trust-os-opensearch-sg-${Environment}'

  NeptuneSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Neptune cluster
      VpcId: !Ref AITrustOSVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8182
          ToPort: 8182
          SourceSecurityGroupId: !Ref LambdaSecurityGroup
      Tags:
        - Key: Name
          Value: !Sub 'ai-trust-os-neptune-sg-${Environment}'

  # IAM Roles
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
      Policies:
        - PolicyName: AITrustOSLambdaPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/ai-trust-os-*'
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                  - bedrock:GetFoundationModel
                  - bedrock:ListFoundationModels
                Resource: '*'
              - Effect: Allow
                Action:
                  - bedrock:ApplyGuardrail
                  - bedrock:ListGuardrails
                  - bedrock:GetGuardrail
                Resource: '*'
              - Effect: Allow
                Action:
                  - bedrock:StartEvaluationJob
                  - bedrock:GetEvaluationJob
                  - bedrock:ListEvaluationJobs
                Resource: '*'
              - Effect: Allow
                Action:
                  - es:ESHttpPost
                  - es:ESHttpPut
                  - es:ESHttpGet
                Resource: !Sub 'arn:aws:es:${AWS::Region}:${AWS::AccountId}:domain/ai-trust-os-*'
              - Effect: Allow
                Action:
                  - neptune-db:connect
                  - neptune-db:ReadDataViaQuery
                  - neptune-db:WriteDataViaQuery
                Resource: '*'
              - Effect: Allow
                Action:
                  - cloudtrail:LookupEvents
                  - cloudtrail:GetTrail
                  - cloudtrail:ListTrails
                Resource: '*'
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                Resource:
                  - !Sub 'arn:aws:s3:::ai-trust-os-*/*'
              - Effect: Allow
                Action:
                  - stepfunctions:GetActivityTask
                  - stepfunctions:SendTaskSuccess
                  - stepfunctions:SendTaskFailure
                  - stepfunctions:SendTaskHeartbeat
                Resource: '*'
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: '*'
      Tags:
        - Key: Name
          Value: !Sub 'ai-trust-os-lambda-role-${Environment}'

  StepFunctionsExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: states.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: AITrustOSStepFunctionsPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource: !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:ai-trust-os-*'
              - Effect: Allow
                Action:
                  - bedrock:ApplyGuardrail
                Resource: '*'
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: '*'
      Tags:
        - Key: Name
          Value: !Sub 'ai-trust-os-stepfunctions-role-${Environment}'

  CodeGuruRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codeguru-reviewer.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: AITrustOSCodeGuruPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                Resource: '*'
      Tags:
        - Key: Name
          Value: !Sub 'ai-trust-os-codeguru-role-${Environment}'

  # KMS Key for encryption
  AITrustOSKMSKey:
    Type: AWS::KMS::Key
    Properties:
      Description: KMS key for AI Trust OS data encryption
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: Enable IAM User Permissions
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'
          - Sid: Allow Bedrock Service
            Effect: Allow
            Principal:
              Service: bedrock.amazonaws.com
            Action:
              - kms:Encrypt
              - kms:Decrypt
              - kms:GenerateDataKey*
              - kms:DescribeKey
            Resource: '*'
          - Sid: Allow Lambda Service
            Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action:
              - kms:Encrypt
              - kms:Decrypt
              - kms:GenerateDataKey*
            Resource: '*'

  AITrustOSKMSKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub 'alias/ai-trust-os-key-${Environment}'
      TargetKeyId: !Ref AITrustOSKMSKey

  # CloudWatch Log Group
  AITrustOSLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ai-trust-os/audit-logs
      RetentionInDays: !Ref LogRetentionDays
      KmsKeyId: !Ref AITrustOSKMSKey

  # SNS Topic for notifications
  AITrustOSNotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub 'ai-trust-os-notifications-${Environment}'
      KmsMasterKeyId: !Ref AITrustOSKMSKey
      Tags:
        - Key: Name
          Value: !Sub 'ai-trust-os-notifications-${Environment}'

  # S3 Bucket for audit logs
  AITrustOSS3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'ai-trust-os-audit-${AWS::AccountId}-${Environment}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              KMSMasterKeyID: !Ref AITrustOSKMSKey
              SSEAlgorithm: aws:kms
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: TransitionToGlacier
            Status: Enabled
            Transition:
              StorageClass: GLACIER
              TransitionInDays: 90
          - Id: ExpireOldLogs
            Status: Enabled
            ExpirationInDays: 2555
      Tags:
        - Key: Name
          Value: !Sub 'ai-trust-os-audit-${Environment}'

  AITrustOSS3BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref AITrustOSS3Bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: DenyUnencryptedUploads
            Effect: Deny
            Principal: '*'
            Action: s3:PutObject
            Resource: !Sub '${AITrustOSS3Bucket}/*'
            Condition:
              StringNotEquals:
                s3:x-amz-server-side-encryption: aws:kms
          - Sid: DenyWrongKMSKey
            Effect: Deny
            Principal: '*'
            Action: s3:PutObject
            Resource: !Sub '${AITrustOSS3Bucket}/*'
            Condition:
              StringNotEquals:
                s3:x-amz-server-side-encryption-aws-kms-key-id: !GetAtt AITrustOSKMSKey.Arn

  # VPC Flow Logs
  VPCFlowLog:
    Type: AWS::EC2::FlowLog
    Properties:
      DeliverLogsPermissionArn: !GetAtt FlowLogRole.Arn
      LogGroupName: !Ref VPCFlowLogGroup
      ResourceId: !Ref AITrustOSVPC
      ResourceType: VPC
      TrafficType: ALL
      LogFormat: '${version} ${account-id} ${interface-id} ${srcaddr} ${dstaddr} ${srcport} ${dstport} ${protocol} ${packets} ${bytes} ${start} ${end} ${action} ${log-status}'

  VPCFlowLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ai-trust-os/vpc-flow-logs
      RetentionInDays: 30

  FlowLogRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: vpc-flow-logs.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CloudWatchLogsPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - logs:DescribeLogGroups
                  - logs:DescribeLogStreams
                Resource: '*'

Outputs:
  VPCId:
    Description: VPC ID
    Value: !Ref AITrustOSVPC
    Export:
      Name: !Sub 'ai-trust-os-vpc-id-${Environment}'
  
  PublicSubnet1:
    Description: Public Subnet 1 ID
    Value: !Ref PublicSubnet1
    Export:
      Name: !Sub 'ai-trust-os-public-subnet-1-${Environment}'
  
  PublicSubnet2:
    Description: Public Subnet 2 ID
    Value: !Ref PublicSubnet2
    Export:
      Name: !Sub 'ai-trust-os-public-subnet-2-${Environment}'
  
  PrivateSubnet1:
    Description: Private Subnet 1 ID
    Value: !Ref PrivateSubnet1
    Export:
      Name: !Sub 'ai-trust-os-private-subnet-1-${Environment}'
  
  PrivateSubnet2:
    Description: Private Subnet 2 ID
    Value: !Ref PrivateSubnet2
    Export:
      Name: !Sub 'ai-trust-os-private-subnet-2-${Environment}'
  
  DatabaseSubnet1:
    Description: Database Subnet 1 ID
    Value: !Ref DatabaseSubnet1
    Export:
      Name: !Sub 'ai-trust-os-db-subnet-1-${Environment}'
  
  DatabaseSubnet2:
    Description: Database Subnet 2 ID
    Value: !Ref DatabaseSubnet2
    Export:
      Name: !Sub 'ai-trust-os-db-subnet-2-${Environment}'
  
  LambdaSecurityGroup:
    Description: Lambda Security Group ID
    Value: !Ref LambdaSecurityGroup
    Export:
      Name: !Sub 'ai-trust-os-lambda-sg-${Environment}'
  
  OpenSearchSecurityGroup:
    Description: OpenSearch Security Group ID
    Value: !Ref OpenSearchSecurityGroup
    Export:
      Name: !Sub 'ai-trust-os-opensearch-sg-${Environment}'
  
  NeptuneSecurityGroup:
    Description: Neptune Security Group ID
    Value: !Ref NeptuneSecurityGroup
    Export:
      Name: !Sub 'ai-trust-os-neptune-sg-${Environment}'
  
  LambdaExecutionRoleArn:
    Description: Lambda Execution Role ARN
    Value: !GetAtt LambdaExecutionRole.Arn
    Export:
      Name: !Sub 'ai-trust-os-lambda-role-${Environment}'
  
  StepFunctionsExecutionRoleArn:
    Description: Step Functions Execution Role ARN
    Value: !GetAtt StepFunctionsExecutionRole.Arn
    Export:
      Name: !Sub 'ai-trust-os-stepfunctions-role-${Environment}'
  
  KMSKeyId:
    Description: KMS Key ID
    Value: !Ref AITrustOSKMSKey
    Export:
      Name: !Sub 'ai-trust-os-kms-key-${Environment}'
  
  KMSKeyArn:
    Description: KMS Key ARN
    Value: !GetAtt AITrustOSKMSKey.Arn
    Export:
      Name: !Sub 'ai-trust-os-kms-key-arn-${Environment}'
  
  S3BucketName:
    Description: Audit S3 Bucket Name
    Value: !Ref AITrustOSS3Bucket
    Export:
      Name: !Sub 'ai-trust-os-s3-bucket-${Environment}'
  
  SNSTopicArn:
    Description: Notification SNS Topic ARN
    Value: !Ref AITrustOSNotificationTopic
    Export:
      Name: !Sub 'ai-trust-os-sns-topic-${Environment}'
  
  LogGroupName:
    Description: CloudWatch Log Group for Audit Logs
    Value: !Ref AITrustOSLogGroup
    Export:
      Name: !Sub 'ai-trust-os-log-group-${Environment}'